# TiB AI Coach — Netlify (Next.js Runtime v5)
# Pro plan: ask Netlify support to enable 26s function timeout for this site.

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  # Requires Netlify Pro + support enablement to take effect (max 26s).
  timeout = 26
